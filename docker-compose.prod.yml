services:
  php:
    build:
      context: .
      dockerfile: ./vemitienda/Dockerfile
    container_name: vemitiendabackend-php
    volumes:
      - ./vemitienda:/var/www
    ports:
      - 9000:80
    networks:
      - vemitienda

  nginx:
    image: nginx:stable-alpine
    container_name: vemitiendabackend-nginx
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./vemitienda:/var/www
      - ./vemitienda/nginx/default.prod.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - acme-challenge:/var/www/html
    depends_on:
      - php
      - miwisachat
    networks:
      - vemitienda

  miwisachat:
    build:
      context: ./miwisachat
      dockerfile: Dockerfile
    container_name: miwisachat-node
    env_file:
      - ./miwisachat/.env
    volumes:
      - ./miwisachat:/app
      - /app/node_modules
    expose:
      - 3977
    networks:
      - vemitienda
    restart: always

  certbot:
    image: certbot/certbot
    container_name: vemitiendabackend-certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - acme-challenge:/var/www/html
    environment:
      - TZ=America/Caracas
    entrypoint: |
      sh -c '
        trap exit TERM
        while true; do
          certbot renew --webroot -w /var/www/html --quiet --noninteractive
          sleep 43200
        done
      '
    networks:
      - vemitienda

volumes:
  acme-challenge:

networks:
  vemitienda:
