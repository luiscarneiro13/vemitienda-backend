<script>
    async function enviar() {
        const btn = document.getElementById('btnEnviar');
        const status = document.getElementById('status');
        const url = document.getElementById('url').value;
        const token = document.getElementById('token').value;

        if (!url || !token) return alert("Rellena los campos");

        btn.disabled = true;
        status.className = "info";
        status.innerHTML = "Validando credenciales...";

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Accept': 'application/json',
                    'Content-Type': 'application/json' // Añadido para evitar problemas de parsing
                }
            });

            if (response.ok) {
                const data = await response.json();

                // Si el backend nos da la URL, redirigimos nosotros
                if (data.redirect_url) {
                    status.innerHTML = "¡Validado! Redirigiendo...";
                    window.location.href = data.redirect_url;
                } else {
                    status.innerHTML = "Petición exitosa, pero no se recibió URL de retorno.";
                }
            } else {
                const errData = await response.json().catch(() => ({}));
                status.className = "error";
                status.innerHTML = `Error ${response.status}: ${errData.message || 'No autorizado'}`;
                btn.disabled = false;
            }

        } catch (error) {
            status.className = "error";
            status.innerHTML = "Error de red o CORS. Asegúrate que en App-B el archivo cors.php incluya 'saberes/*'.";
            btn.disabled = false;
            console.error(error);
        }
    }
</script>
